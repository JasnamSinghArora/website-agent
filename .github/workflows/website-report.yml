name: Website Health Report

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM India time
    - cron: "30 9 * * *"   # 3:00 PM India time
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run website health agent
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
          TIMEZONE_LABEL: Asia/Kolkata
        run: python website_health_agent.py
